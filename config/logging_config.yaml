version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/proyecto_integrador.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/proyecto_integrador_errors.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

loggers:
  proyecto_integrador:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: no

  # Loggers específicos por módulo
  data:
    level: DEBUG
    handlers: [console, file]
    propagate: no

  api:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: no

  models:
    level: INFO
    handlers: [console, file]
    propagate: no

root:
  level: WARNING
  handlers: [console]
